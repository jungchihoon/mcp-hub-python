<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Hub 관리자</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body class="bg-gray-100">
    <div x-data="mcpHub()" class="container mx-auto px-4 py-8">
        <header class="mb-8">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">🐍 MCP Hub Python</h1>
            <p class="text-gray-600">Model Context Protocol 서버 중앙 관리자</p>
        </header>

        <!-- 상태 카드 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow-md p-6">
                <h3 class="text-lg font-semibold text-gray-700 mb-2">🔗 연결된 서버</h3>
                <p class="text-3xl font-bold text-blue-600" x-text="stats.connectedServers"></p>
            </div>
            
            <div class="bg-white rounded-lg shadow-md p-6">
                <h3 class="text-lg font-semibold text-gray-700 mb-2">🛠️ 사용 가능한 도구</h3>
                <p class="text-3xl font-bold text-green-600" x-text="stats.totalTools"></p>
            </div>
            
            <div class="bg-white rounded-lg shadow-md p-6">
                <h3 class="text-lg font-semibold text-gray-700 mb-2">📚 리소스</h3>
                <p class="text-3xl font-bold text-purple-600" x-text="stats.totalResources"></p>
            </div>
        </div>

        <!-- 서버 목록 -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">MCP 서버 상태</h2>
            
            <div class="overflow-x-auto">
                <table class="w-full table-auto">
                    <thead>
                        <tr class="border-b">
                            <th class="text-left py-3 px-4">서버명</th>
                            <th class="text-left py-3 px-4">상태</th>
                            <th class="text-left py-3 px-4">도구</th>
                            <th class="text-left py-3 px-4">리소스</th>
                            <th class="text-left py-3 px-4">프롬프트</th>
                            <th class="text-left py-3 px-4">액션</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="server in servers" :key="server.name">
                            <tr class="border-b hover:bg-gray-50">
                                <td class="py-3 px-4">
                                    <span class="font-medium" x-text="server.name"></span>
                                </td>
                                <td class="py-3 px-4">
                                    <span 
                                        class="px-2 py-1 rounded-full text-xs font-medium"
                                        :class="{
                                            'bg-green-100 text-green-800': server.status === 'connected',
                                            'bg-red-100 text-red-800': server.status === 'disconnected',
                                            'bg-yellow-100 text-yellow-800': server.status === 'connecting',
                                            'bg-gray-100 text-gray-800': server.status === 'disabled'
                                        }"
                                        x-text="getStatusText(server.status)"
                                    ></span>
                                </td>
                                <td class="py-3 px-4" x-text="server.tools || 0"></td>
                                <td class="py-3 px-4" x-text="server.resources || 0"></td>
                                <td class="py-3 px-4" x-text="server.prompts || 0"></td>
                                <td class="py-3 px-4">
                                    <button 
                                        @click="reconnectServer(server.name)"
                                        class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-1 px-3 rounded text-sm"
                                        :disabled="server.status === 'connecting'"
                                    >
                                        재연결
                                    </button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 실시간 로그 -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">실시간 이벤트 로그</h2>
            
            <div class="h-64 overflow-y-auto bg-gray-900 text-green-400 p-4 rounded-lg font-mono text-sm">
                <template x-for="log in logs" :key="log.id">
                    <div class="mb-1">
                        <span class="text-gray-500" x-text="log.timestamp"></span>
                        <span x-text="log.message"></span>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <script>
        function mcpHub() {
            return {
                stats: {
                    connectedServers: 0,
                    totalTools: 0,
                    totalResources: 0
                },
                servers: [],
                logs: [],
                logId: 0,

                async init() {
                    await this.fetchStats();
                    await this.fetchServers();
                    this.connectEventSource();
                    this.addLog('MCP Hub 관리자 초기화 완료');
                },

                async fetchStats() {
                    try {
                        const response = await fetch('/api/stats');
                        this.stats = await response.json();
                    } catch (error) {
                        this.addLog('통계 조회 실패: ' + error.message);
                    }
                },

                async fetchServers() {
                    try {
                        const response = await fetch('/api/servers');
                        this.servers = await response.json();
                    } catch (error) {
                        this.addLog('서버 목록 조회 실패: ' + error.message);
                    }
                },

                async reconnectServer(serverName) {
                    try {
                        this.addLog(`${serverName} 서버 재연결 중...`);
                        const response = await fetch(`/api/servers/${serverName}/reconnect`, {
                            method: 'POST'
                        });
                        
                        if (response.ok) {
                            this.addLog(`${serverName} 서버 재연결 성공`);
                            await this.fetchServers();
                            await this.fetchStats();
                        } else {
                            this.addLog(`${serverName} 서버 재연결 실패`);
                        }
                    } catch (error) {
                        this.addLog(`${serverName} 서버 재연결 오류: ` + error.message);
                    }
                },

                connectEventSource() {
                    const eventSource = new EventSource('/api/events');
                    
                    eventSource.onmessage = (event) => {
                        const data = JSON.parse(event.data);
                        this.addLog(`이벤트: ${data.type} - ${data.message || JSON.stringify(data)}`);
                        
                        // 서버 상태 변경 시 자동 새로고침
                        if (data.type === 'serverStatusChanged') {
                            this.fetchServers();
                            this.fetchStats();
                        }
                    };
                    
                    eventSource.onerror = () => {
                        this.addLog('실시간 이벤트 연결 끊어짐');
                    };
                },

                addLog(message) {
                    const now = new Date();
                    const timestamp = now.toLocaleTimeString();
                    
                    this.logs.unshift({
                        id: this.logId++,
                        timestamp,
                        message
                    });
                    
                    // 로그는 최대 100개까지만 유지
                    if (this.logs.length > 100) {
                        this.logs = this.logs.slice(0, 100);
                    }
                },

                getStatusText(status) {
                    const statusMap = {
                        'connected': '연결됨',
                        'disconnected': '연결 끊어짐',
                        'connecting': '연결 중',
                        'disabled': '비활성화',
                        'error': '오류'
                    };
                    return statusMap[status] || status;
                }
            }
        }
    </script>
</body>
</html>
